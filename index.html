<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="ml-dashboard-header">
        <h1>SkyCast <span style="color: var(--accent)">Pro</span></h1>
        <div class="prediction-card">
            <h3 style="margin-top:0; font-size: 0.8rem; color: var(--accent);">ML SMART PREDICTION</h3>
            <div id="ml-result">
                <span style="font-size: 1.2rem;">Model Status: <span style="color: #4cd137;">Live</span></span>
                <p style="margin: 10px 0 0 0; opacity: 0.7; font-size: 0.9rem;">
                    Predicted Temp for next hour: <strong>--°F</strong>
                </p>
            </div>
        </div>
    </header>

    <div class="gridForWeatherStats" id="DailyContainer"></div>

    <h2 style="padding-left: 20px; margin-top: 40px; font-weight: 300;">Hourly Details</h2>
    <div class="ContainerForMainWeather" id="HourlyContainer"></div>

};

        const ContainerForMainHourly = document.getElementById("HourlyContainer")
        const ContainerForDays = document.getElementById("DailyContainer")

        async function GetJSON(url) {
            const response = await fetch(url, {
                method: "GET",
                headers: {
                    "User-Agent": "MyWeatherApp (benblagoev@gmail.com)"
                }
            })

            if (!response.ok) {
                console.error("Weather API did not work", response.status)
                return;
            }

            const DataFromAPI = await response.json();
            return DataFromAPI;
        }
    

        function GetHourlyCards(DataHours, day) {
            ContainerForMainHourly.innerHTML = ``
            const start = day * 24;
            const end = start + 24;
            const dayTemps = DataHours.temperature_2m.slice(start, end);
            const dayTimes = DataHours.time.slice(start, end);
            const DayHumidities = DataHours.relative_humidity_2m.slice(start, end);

            dayTemps.forEach((temp, index) => {
                const rawTime = dayTimes[index + 1]
                const dateObj = new Date(rawTime);
                const DayTemp = dayTemps[index]
                const DayHumidity = DayHumidities[index]

                // Format to: "Sunday, 8:00 PM"
                const formatted = dateObj.toLocaleString('en-US', {
                    weekday: 'long',
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                const ParentCard = document.createElement("div")
                ParentCard.classList.add("Hourly")
                ParentCard.innerHTML = `
                    <div class="HourlyTime">
                        ${formatted}
                    </div>
                    <div class="HourlyData">
                        <div class="HourlyTemp">${DayTemp}°F</div>
                        <div class="HourlyHumidity">${DayHumidity}% Humidity</div>
                    </div>
                `;      
                ContainerForMainHourly.appendChild(ParentCard)


            })
        }

        function GetDaysOfWeek(Data) {
            console.log(Data)
            const Days = Data.time
            const Weather_code = Data.weather_code
            Days.forEach((time, index) => {
                const MaxTemp = Data.temperature_2m_max[index]
                const MinTemp = Data.temperature_2m_min[index]
                const WeatherCode = Weather_code[index]
                const WeatherImage = wmo_to_map_icon[WeatherCode][3]
                const dayName = new Date(time + "T00:00").toLocaleDateString('en-US', { weekday: 'long' });
                const ParentCard = document.createElement("div")
                ParentCard.classList.add("WeatherBlock")
                ParentCard.id = "TestingWeather"
               // Look for this inside GetDaysOfWeek
                ParentCard.innerHTML = `
                    <div class="WeatherTitle">
                        ${dayName}
                    </div>
                    <div class="WeatherImage" style="--WeatherImage: url('${WeatherImage}')"></div>
                    <div class="DailyStats">
                        <span class="HighLow">${MaxTemp}° / ${MinTemp}°</span>
                    </div>
                    `;
                ContainerForDays.appendChild(ParentCard)
                ParentCard.addEventListener("click", () => {
                    GetHourlyCards(DataHourly, index)
                })
            })
        }

        let latitude = 40.82071
        let longitude = -74.63256
        const WeatherLink = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min&hourly=temperature_2m,weather_code,relative_humidity_2m&current=weather_code,temperature_2m,relative_humidity_2m&timezone=auto&past_days=0&forecast_days=7&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch`;
        let ForcastData = await GetJSON(WeatherLink);
        GetDaysOfWeek(ForcastData.daily)
        const DataHourly = ForcastData.hourly
        GetHourlyCards(DataHourly, 0)
    </script>

</body>
